name: Next.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Prisma Generate
      run: npx prisma generate

    - name: Build Next.js
      run: npm run build
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres" # Dummy for build step
        NEXTAUTH_SECRET: "dummy-secret"
        NEXTAUTH_URL: "http://localhost:3000"
        GOOGLE_CLIENT_ID: "dummy"
        GOOGLE_CLIENT_SECRET: "dummy"
